name: Backtest

on:
  schedule:
    - cron: '0 12 * * 1'  # Mondays 12pm UTC (after recap), grades the just-completed week
  workflow_dispatch:
    inputs:
      dates:
        description: 'Optional date range YYYY-MM-DD:YYYY-MM-DD (overrides default last-completed-week)'
        required: false
        default: ''

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # Backtest snapshot data only lives in the GHA cache (the hourly lineup
      # workflow writes .backtest/snapshots there). Restore it so projection
      # grading has data; .cache warm-starts the Fantrax period snapshots.
      - name: Restore projection cache
        uses: actions/cache@v5
        with:
          path: |
            .cache
            .backtest/snapshots
          key: projections-${{ github.run_id }}
          restore-keys: projections-

      - name: Restore Fantrax session
        uses: actions/cache@v5
        with:
          path: .fantrax-cache
          key: fantrax-session-${{ github.run_id }}
          restore-keys: fantrax-session-

      - uses: browser-actions/setup-chrome@v2

      - name: Backtest (lineup + projection grading)
        run: go run . backtest ${{ github.event.inputs.dates && format('--dates {0}', github.event.inputs.dates) || '' }}
        env:
          FANTRAX_USERNAME: ${{ secrets.FANTRAX_USERNAME }}
          FANTRAX_PASSWORD: ${{ secrets.FANTRAX_PASSWORD }}
          FANTRAX_LEAGUE_ID: ${{ secrets.FANTRAX_LEAGUE_ID }}
          FANTRAX_TEAM_ID: ${{ secrets.FANTRAX_TEAM_ID }}
          FANTRAX_IL_SLOTS: ${{ secrets.FANTRAX_IL_SLOTS }}
          FANTRAX_MINORS_SLOTS: ${{ secrets.FANTRAX_MINORS_SLOTS }}

      - name: Recency strategy comparison (hitters)
        run: go run . backtest --recency-experiment ${{ github.event.inputs.dates && format('--dates {0}', github.event.inputs.dates) || '' }}
        env:
          FANTRAX_USERNAME: ${{ secrets.FANTRAX_USERNAME }}
          FANTRAX_PASSWORD: ${{ secrets.FANTRAX_PASSWORD }}
          FANTRAX_LEAGUE_ID: ${{ secrets.FANTRAX_LEAGUE_ID }}
          FANTRAX_TEAM_ID: ${{ secrets.FANTRAX_TEAM_ID }}
          FANTRAX_IL_SLOTS: ${{ secrets.FANTRAX_IL_SLOTS }}
          FANTRAX_MINORS_SLOTS: ${{ secrets.FANTRAX_MINORS_SLOTS }}
